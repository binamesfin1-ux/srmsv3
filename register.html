<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for Messenger Clone">
    <title>Register - Messenger Clone</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- Left Section - Branding -->
        <div class="auth-left">
            <div class="auth-branding">
                <div class="brand-logo">💬</div>
                <h1 class="brand-title">Messenger</h1>
                <p class="brand-subtitle">Join millions connecting worldwide</p>
            </div>
        </div>

        <!-- Right Section - Registration Form -->
        <div class="auth-right">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join us today and start chatting</p>
                </div>

                <form id="registerForm" class="auth-form">
                    <!-- Full Name Field -->
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
                            </svg>
                            <input 
                                type="text" 
                                id="fullName" 
                                name="fullName" 
                                class="form-input" 
                                placeholder="Enter your full name"
                                required
                                autocomplete="name"
                            >
                        </div>
                        <span class="error-message" id="fullNameError"></span>
                    </div>

                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="registerUsername" class="form-label">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
                            </svg>
                            <input 
                                type="text" 
                                id="registerUsername" 
                                name="username" 
                                class="form-input" 
                                placeholder="Choose a username"
                                required
                                autocomplete="username"
                            >
                        </div>
                        <span class="error-message" id="usernameError"></span>
                        <span class="helper-text">3-20 characters, alphanumeric and underscores only</span>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="registerEmail" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 8l7.89 5.26a2 2 0 0 0 2.22 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/>
                            </svg>
                            <input 
                                type="email" 
                                id="registerEmail" 
                                name="email" 
                                class="form-input" 
                                placeholder="Enter your email"
                                required
                                autocomplete="email"
                            >
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="registerPassword" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                id="registerPassword" 
                                name="password" 
                                class="form-input" 
                                placeholder="Create a strong password"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password-btn" id="togglePassword">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                        <span class="helper-text">At least 8 characters, uppercase, lowercase, number, and symbol</span>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                class="form-input" 
                                placeholder="Confirm your password"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password-btn" id="toggleConfirmPassword">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <!-- Terms & Conditions -->
                    <label class="checkbox">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <span>I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a></span>
                    </label>
                    <span class="error-message" id="termsError"></span>

                    <!-- Register Button -->
                    <button type="submit" class="auth-btn" id="registerBtn">
                        <span>Create Account</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>

                    <!-- Error Message -->
                    <div class="alert alert-error" id="registerError" style="display: none;"></div>
                    <!-- Success Message -->
                    <div class="alert alert-success" id="registerSuccess" style="display: none;"></div>
                </form>

                <!-- Sign In Link -->
                <p class="auth-footer">
                    Already have an account? 
                    <a href="login.html" class="auth-link">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
